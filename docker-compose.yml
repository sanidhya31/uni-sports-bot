services:
  sports-bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USER_DB_PATH: /app/data/users.db
    volumes:
      # Persist the encrypted user database across restarts (directory mount
      # avoids Docker creating a stray dir when the db file doesn't exist yet).
      - ./data:/app/data
